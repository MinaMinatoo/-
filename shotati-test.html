<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOTATI - 虚拟正太UP主测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-hover: #22223a;
      --primary: #a855f7;
      --secondary: #ec4899;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(168,85,247,0.25);
      --glow: rgba(168,85,247,0.4);
      --cyan: #22d3ee;
      --gold: #fbbf24;
      --blue-300: #93c5fd;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --indigo-400: #818cf8;
      --indigo-500: #6366f1;
      --bg-card: #1a1a2e;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(168,85,247,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.08) 0%, transparent 50%);
    }

    /* 星空粒子 */
    .bg-stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.25), transparent),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1.5px 1.5px at 50% 10%, rgba(168,85,247,0.3), transparent),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px 1px at 90% 40%, rgba(168,85,247,0.25), transparent),
        radial-gradient(1.5px 1.5px at 15% 85%, rgba(236,72,153,0.25), transparent),
        radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.12), transparent),
        radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.15), transparent),
        radial-gradient(1px 1px at 60% 70%, rgba(168,85,247,0.18), transparent);
    }

    .bg-orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0;
    }
    .bg-orb.orb1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(168,85,247,0.12), transparent 70%);
      top: -100px; right: -100px;
    }
    .bg-orb.orb2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(236,72,153,0.1), transparent 70%);
      bottom: -50px; left: -80px;
    }

    /* 流星 */
    .meteor {
      position: fixed;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: white;
      z-index: 0;
      pointer-events: none;
      box-shadow:
        0 0 4px 1px rgba(255,255,255,0.9),
        0 0 12px 3px rgba(168,85,247,0.6);
      animation: meteorFly linear infinite;
      opacity: 0;
    }
    .meteor::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 90px;
      height: 2px;
      background: linear-gradient(to right, rgba(168,85,247,0.8), rgba(168,85,247,0));
      transform-origin: left center;
      transform: rotate(-50deg);
    }
    .meteor#m1 { top: 5%;  right: -10px; animation: meteorFly 3.5s ease-in 0.5s infinite; }
    .meteor#m2 { top: 18%; right: -10px; animation: meteorFly 4.2s ease-in 2.1s infinite; }
    .meteor#m3 { top: 8%;  right: -10px; animation: meteorFly 3s ease-in 4.8s infinite; }
    .meteor#m4 { top: 25%; right: -10px; animation: meteorFly 5s ease-in 1.3s infinite; }

    @keyframes meteorFly {
      0%   { transform: translate(0, 0); opacity: 0; }
      5%   { opacity: 1; }
      30%  { opacity: 1; }
      100% { transform: translate(-110vw, 90vh); opacity: 0; }
    }

    .screen { display: none; width: 100%; max-width: 680px; padding: 20px; position: relative; z-index: 1; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    /* ===== START SCREEN ===== */
    #start-screen { gap: 32px; text-align: center; padding-top: 60px; }

    .logo-wrap { position: relative; }

    .logo-emoji {
      font-size: 80px;
      line-height: 1;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(168,85,247,0.6));
    }

    .logo-title {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 16px;
      letter-spacing: 2px;
    }

    .logo-sub {
      font-size: 1rem;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 4px;
    }

    .start-desc {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 480px;
      background: rgba(26,26,46,0.8);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
    }

    .start-desc strong { color: var(--primary); }

    .btn-start {
      position: relative;
      padding: 16px 48px;
      font-size: 1.15rem;
      font-weight: 700;
      font-family: inherit;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 50px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 30px rgba(168,85,247,0.4);
      letter-spacing: 2px;
    }

    .btn-start::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(168,85,247,0.6); }
    .btn-start:hover::after { opacity: 1; }
    .btn-start:active { transform: translateY(0); }

    .disclaimer {
      font-size: 0.7rem;
      color: rgba(148,163,184,0.5);
      text-align: center;
    }

    /* ===== QUIZ SCREEN ===== */
    #quiz-screen { gap: 24px; padding-top: 40px; }

    .progress-wrap { width: 100%; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }

    .match-live {
      font-size: 0.85rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      transition: opacity 0.3s;
    }

    .progress-track {
      width: 100%;
      height: 5px;
      background: rgba(168,85,247,0.12);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 10px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .question-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      animation: fadeInUp 0.4s ease-out;
    }

    .question-number {
      font-size: 0.75rem;
      color: var(--primary);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .question-text {
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 500;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 24px;
    }

    .options { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .option-btn {
      width: 100%;
      padding: 14px 20px;
      background: rgba(26,26,46,0.6);
      border: 1.5px solid rgba(168,85,247,0.2);
      border-radius: 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.5;
    }

    .option-btn .opt-letter {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(168,85,247,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--primary);
      transition: all 0.2s;
    }

    .option-btn:hover {
      background: rgba(168,85,247,0.12);
      border-color: var(--primary);
      transform: translateX(4px);
      box-shadow: 0 0 20px rgba(168,85,247,0.15);
    }

    .option-btn:hover .opt-letter {
      background: var(--primary);
      color: white;
    }

    .option-btn:active { transform: translateX(2px) scale(0.97); }

    /* 选中态 - 选中后高亮 */
    .option-btn.selected {
      background: rgba(168,85,247,0.25);
      border-color: var(--primary);
      box-shadow: 0 0 24px rgba(168,85,247,0.35);
      transform: translateX(4px);
    }
    .option-btn.selected .opt-letter {
      background: var(--primary);
      color: white;
    }
    .option-btn.selected::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
      border-radius: 0 2px 2px 0;
    }

    /* 按下态 - 触控反馈 */
    .option-btn.pressing {
      transform: scale(0.97);
      background: rgba(168,85,247,0.2);
    }

    /* 回退按钮 */
    .nav-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-top: 8px;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(168,85,247,0.2);
      color: var(--text-muted);
    }
    .btn-back:hover {
      background: rgba(168,85,247,0.1);
      color: var(--primary);
      border-color: rgba(168,85,247,0.4);
      transform: translateX(-2px);
    }
    .btn-back:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }
    .btn-back:disabled:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      border-color: rgba(168,85,247,0.2);
    }

    /* ===== RESULT SCREEN ===== */
    #result-screen {
      padding-top: 50px;
      padding-bottom: 60px;
      gap: 0;
      max-width: 640px;
    }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 20px;
      border-radius: 20px;
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.25);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 28px;
      animation: flyFromTop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* 头像区域 */
    .result-avatar-wrap {
      position: relative;
      width: 148px;
      height: 148px;
      margin: 0 auto 20px;
      animation: zoomPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    }

    .result-avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--primary),
        var(--secondary),
        var(--cyan),
        var(--primary)
      );
      animation: ringRotate 4s linear infinite;
    }

    /* 头像呼吸动画 */
    .result-avatar-wrap {
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes ringRotate { to { transform: rotate(360deg); } }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .result-avatar {
      position: relative;
      z-index: 1;
      width: 148px;
      height: 148px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--bg);
    }

    .result-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 名字区域 */
    .result-name-wrap { text-align: center; animation: flyFromBottom 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both; margin-bottom: 8px; }

    .result-name {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .result-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* 匹配度 */
    .result-pct-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 16px 0 28px;
      animation: flyFromLeft 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
    }

    .result-pct-bar-track {
      width: 140px;
      height: 6px;
      background: rgba(168,85,247,0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    .result-pct-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 3px;
      transition: width 1.4s cubic-bezier(0.4,0,0.2,1) 0.5s;
      width: 0%;
    }

    .result-pct-text {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-width: 60px;
    }

    /* 标签 */
    .result-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
      animation: flyFromRight 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.35s both;
    }

    .result-tag {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.2);
      color: var(--blue-300);
    }

    /* 通用 result section */
    .result-section {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid rgba(168,85,247,0.15);
      border-radius: 18px;
      padding: 22px 24px;
      margin-bottom: 14px;
      text-align: left;
    }

    .result-section-title {
      font-size: 12px;
      color: var(--primary);
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .result-section p {
      font-size: 14.5px;
      color: var(--text-secondary);
      line-height: 1.85;
    }

    .result-quote-card { animation: flyFromLeft 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both; }

    .result-quote {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.8;
      color: var(--text);
      font-style: italic;
    }

    .result-detail-card { animation: flyFromRight 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.45s both; }

    /* 维度分析 */
    .result-dimensions-card { animation: flyFromBottom 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s both; }

    /* ===== 雷达图 ===== */
    .radar-section {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid rgba(168,85,247,0.15);
      border-radius: 18px;
      padding: 22px 24px;
      margin-bottom: 14px;
      text-align: center;
      animation: flyFromRight 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.48s both;
    }

    .radar-section-title {
      font-size: 12px;
      color: var(--primary);
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .radar-canvas-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #radar-canvas {
      max-width: 100%;
    }

    /* ===== 次级匹配角色 ===== */
    .secondary-section {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid rgba(168,85,247,0.15);
      border-radius: 18px;
      padding: 22px 24px;
      margin-bottom: 14px;
      text-align: center;
      animation: flyFromBottom 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.52s both;
    }

    .secondary-section-title {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .secondary-char {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: rgba(168,85,247,0.06);
      border: 1px solid rgba(168,85,247,0.15);
      border-radius: 16px;
      margin: 0 auto;
      max-width: 200px;
    }

    .secondary-avatar-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--secondary),
        var(--primary),
        var(--secondary)
      );
      padding: 3px;
    }

    .secondary-avatar {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--bg);
    }

    .secondary-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .secondary-name {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .secondary-match {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: -4px;
    }

    .secondary-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 4px;
    }

    .secondary-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.2);
      color: var(--blue-300);
    }

    .dim-row { margin-bottom: 24px; }
    .dim-row:last-child { margin-bottom: 0; }

    .dim-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .dim-label .dim-left {
      margin-right: auto;
    }

    .dim-label .dim-mid {
      color: var(--text-muted);
      font-size: 11px;
      opacity: 0.7;
    }

    .dim-label .dim-right {
      margin-left: auto;
    }

    .dim-track {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      position: relative;
    }

    .dim-marker {
      position: absolute;
      top: 50%;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 8px rgba(168,85,247,0.5);
      transform: translate(-50%, -50%);
      transition: left 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s;
      animation: markerBounce 0.6s ease-out 1.3s both;
    }

    @keyframes markerBounce {
      0% { transform: translate(-50%, -50%) scale(1); }
      40% { transform: translate(-50%, -50%) scale(1.4); }
      70% { transform: translate(-50%, -50%) scale(0.9); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }


    .dim-marker-label {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--primary);
      font-weight: 600;
      white-space: nowrap;
    }

    /* 按钮 */
    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
      flex-wrap: wrap;

// ===== STATE =====
let currentQuestion = 0;
let scores = {};
let totalPossible = 0;
let answerHistory = []; // 记录每题的答案，用于回退
let isTransitioning = false; // 防误触标志
const OPT_LETTERS = ['A', 'B', 'C', 'D'];
const DISABLE_DURATION = 150; // 防误触禁用时长(ms)

// ===== FUNCTIONS =====
function startQuiz() {
  currentQuestion = 0;
  scores = {};
  answerHistory = [];
  isTransitioning = false;
  Object.keys(CHARACTERS).forEach(k => scores[k] = 0);
  totalPossible = QUESTIONS.length;

  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('quiz-screen').classList.add('active');
  document.getElementById('match-live').textContent = '5%';
  document.getElementById('btn-back').disabled = true;
  showQuestion(0);
}

function showQuestion(index) {
  const q = QUESTIONS[index];
  const pct = Math.round((index / totalPossible) * 100);

  document.getElementById('progress-text').textContent = `第 ${index + 1} / ${totalPossible} 题`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('match-live').textContent = `${pct}%`;

  // 更新回退按钮状态
  const btnBack = document.getElementById('btn-back');
  btnBack.disabled = index === 0;

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeInUp 0.4s ease-out';

  document.getElementById('q-number').textContent = `QUESTION ${String(index + 1).padStart(2, '0')}`;
  document.getElementById('q-text').textContent = `Q${index + 1}. ${q.text.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/^\s+/, '')}`;

  const container = document.getElementById('options-container');
  container.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${OPT_LETTERS[i]}</span><span>${opt.label}</span>`;
    btn.onclick = () => selectOption(opt, i, btn);

    // 触控按下反馈
    btn.addEventListener('touchstart', () => {
      btn.classList.add('pressing');
    }, { passive: true });
    btn.addEventListener('touchend', () => {
      btn.classList.remove('pressing');
    }, { passive: true });

    // 如果是回退到之前答过的题，显示选中状态
    if (answerHistory[index] !== undefined && answerHistory[index].index === i) {
      btn.classList.add('selected');
    }

    container.appendChild(btn);
  });
}

function selectOption(opt, optIndex, btnElement) {
  // 防误触：正在跳转时忽略点击
  if (isTransitioning) return;
  isTransitioning = true;

  // 震动反馈（移动端）
  if (navigator.vibrate) {
    navigator.vibrate(10);
  }

  // 显示选中态
  btnElement.classList.add('selected');

  // 如果是修改之前的答案，先减去旧分数
  if (answerHistory[currentQuestion] !== undefined) {
    const oldOpt = answerHistory[currentQuestion].option;
    Object.entries(oldOpt.chars).forEach(([charId, pts]) => {
      scores[charId] -= pts;
    });
  }

  // 记录本次答案
  answerHistory[currentQuestion] = { option: opt, index: optIndex };

  // 累加分数
  Object.entries(opt.chars).forEach(([charId, pts]) => {
    scores[charId] = (scores[charId] || 0) + pts;
  });

  // 延迟跳转，让用户看到选中效果
  setTimeout(() => {
    currentQuestion++;

    if (currentQuestion >= QUESTIONS.length) {
      showAnalyzing();
    } else {
      showQuestion(currentQuestion);
    }

    // 防误触解除
    setTimeout(() => {
      isTransitioning = false;
    }, DISABLE_DURATION);
  }, 200);
}

function showAnalyzing() {
  const quizScreen = document.getElementById('quiz-screen');
  const transScreen = document.getElementById('result-transition');
  const transBar = document.getElementById('trans-bar');

  // 答题页淡出
  quizScreen.classList.add('transitioning-out');
  setTimeout(() => {
    quizScreen.classList.remove('active', 'transitioning-out');
  }, 350);

  // 显示过渡页
  transScreen.style.display = 'flex';
  transBar.style.width = '0%';

  // 进度条动画
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      transBar.style.width = '100%';
    });
  });

  // 1.2秒后关掉过渡页 + 显示结果
  setTimeout(() => {
    transScreen.style.display = 'none';
    showResult();
  }, 1200);
}

// ===== 角色权重（已弃用，现改为直接取最高分） =====

function getBestMatch(scores) {
  // 直接取最高分，同样的答案得同样的结果
  const sorted = Object.entries(scores).sort(([, a], [, b]) => b - a);
  return sorted[0][0];
}

function showResult() {
  // 重置结果页动画（重新入场）
  const animatedEls = document.querySelectorAll(
    '.result-badge,.result-avatar-wrap,.result-name-wrap,.result-pct-wrap,.result-tags,.result-quote-card,.result-detail-card,.result-dimensions-card,.result-actions,.result-disclaimer'
  );
  animatedEls.forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = '';
  });

  // 直接取最高分角色
  let bestId = getBestMatch(scores);
  let bestScore = scores[bestId];

  const char = CHARACTERS[bestId];

  // 计算匹配百分比
  const totalAll = Object.values(scores).reduce((a, b) => a + b, 0);
  const avgAll = totalAll / Object.keys(scores).length;
  const maxAll = Math.max(...Object.values(scores));
  const matchPct = Math.round(Math.min(99, 50 + (maxAll - avgAll) / Math.max(1, avgAll) * 40));

  document.getElementById('result-screen').classList.add('active');

  // 头像
  document.getElementById('result-avatar-img').src = char.avatar;

  // 名字
  document.getElementById('result-name').textContent = char.name;
  document.getElementById('result-subtitle').textContent = char.nameEn + ' · ' + char.tags.join(' / ');

  // 匹配度数字
  document.getElementById('result-pct-text').textContent = matchPct + '%';

  // 进度条归零，动画触发
  const bar = document.getElementById('result-pct-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = 'width 1.4s cubic-bezier(0.4,0,0.2,1) 0.5s';
      bar.style.width = matchPct + '%';
    });
  });

  // 标签
  const tagsEl = document.getElementById('result-tags');
  tagsEl.innerHTML = '';
  char.tags.forEach(tag => {
    const span = document.createElement('span');
    span.className = 'result-tag';
    span.textContent = tag;
    tagsEl.appendChild(span);
  });

  // 锐评
  document.getElementById('result-quote').textContent = char.quote;

  // 详细解析
  document.getElementById('result-detail').textContent = char.detail;

  // 维度分析
  const dimConfig = [
    { key: 'energy', label: '内向 ←→ 外向', left: '内敛', right: '外向' },
    { key: 'realism', label: '理想主义 ←→ 现实主义', left: '理想', right: '现实' },
    { key: 'plan', label: '随性 ←→ 规划', left: '随性', right: '规划' },
    { key: 'emotion', label: '冷静 ←→ 热血', left: '冷静', right: '热血' }
  ];

  const dimsEl = document.getElementById('result-dimensions');
  dimsEl.innerHTML = dimConfig.map(d => {
    const val = char.dims[d.key];
    const leftPct = Math.round((1 - val) * 100);
    const isLeft = val < 0.5;
    return `<div class="dim-row">
      <div class="dim-label">
        <span class="dim-left">${d.left}</span><span class="dim-right">${d.right}</span>
      </div>
      <div class="dim-track">
        <div class="dim-marker" id="dim-${d.key}" style="left: ${leftPct}%">
          <span class="dim-marker-label" id="dim-label-${d.key}" style="left: ${isLeft ? 'auto' : '50%'}; right: ${isLeft ? '50%' : 'auto'}; transform: translateX(${isLeft ? '100%' : '-50%'});"></span>
        </div>
      </div>
    </div>`;
  }).join('');

  // 逐个维度动画
  setTimeout(() => {
    dimConfig.forEach(d => {
      const val = char.dims[d.key];
      const leftPct = Math.round((1 - val) * 100);
      const marker = document.getElementById(`dim-${d.key}`);
      if (marker) marker.style.left = leftPct + '%';
    });
  }, 100);

  // 绘制雷达图
  setTimeout(() => {
    drawRadarChart(char.dims);
  }, 200);

  // 显示次级匹配角色
  setTimeout(() => {
    showSecondaryMatch(scores, bestId);
  }, 600);

  document.title = `我是 ${char.name}！| SHOTATI 虚拟正太UP主测试`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('start-screen').classList.add('active');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-text').textContent = '第 1 / 20 题';
  document.getElementById('match-live').textContent = '5%';
  document.title = 'SHOTATI - 虚拟正太UP主测试';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  // 防误触
  if (isTransitioning || currentQuestion === 0) return;
  isTransitioning = true;

  // 震动反馈
  if (navigator.vibrate) {
    navigator.vibrate(8);
  }

  // 恢复到上一题的答案状态
  currentQuestion--;

  // 显示上一题（自动显示之前的选中态）
  showQuestion(currentQuestion);

  // 防误触解除
  setTimeout(() => {
    isTransitioning = false;
  }, DISABLE_DURATION);
}

function shareResult() {
  const name = document.getElementById('result-name').textContent;
  const pct = document.getElementById('result-pct-text').textContent;
  const text = `我在「SHOTATI 虚拟正太UP主测试」中测出了 ${name}！匹配度 ${pct}\n\n你是哪位虚拟正太UP主？快来试试 ♡`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-share');
      const orig = btn.textContent;
      btn.textContent = '已复制 ♡';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    });
  }
}

// ===== 雷达图绘制 =====
function drawRadarChart(dims) {
  const canvas = document.getElementById('radar-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const radius = 70; // 雷达图半径

  // 根据维度值动态显示标签
  const labels = [
    dims.energy >= 0.5 ? '外向' : '内向',
    dims.realism >= 0.5 ? '务实' : '理想',
    dims.plan >= 0.5 ? '规划' : '随性',
    dims.emotion >= 0.5 ? '热血' : '冷静'
  ];

  const values = [dims.energy, dims.realism, dims.plan, dims.emotion];
  const numPoints = values.length;
  const angleStep = (Math.PI * 2) / numPoints;
  const startAngle = -Math.PI / 2;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 画背景网格
  const gridLevels = [0.25, 0.5, 0.75, 1];
  gridLevels.forEach(level => {
    ctx.beginPath();
    for (let i = 0; i <= numPoints; i++) {
      const angle = startAngle + i * angleStep;
      const x = centerX + Math.cos(angle) * radius * level;
      const y = centerY + Math.sin(angle) * radius * level;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(168,85,247,${0.1 + level * 0.1})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // 画轴线和标签 - 标签紧贴雷达图边缘
  const labelPositions = [
    { x: centerX, y: centerY - radius - 6, align: 'center' },   // 上
    { x: centerX + radius + 6, y: centerY, align: 'left' },     // 右
    { x: centerX, y: centerY + radius + 6, align: 'center' },  // 下
    { x: centerX - radius - 6, y: centerY, align: 'right' }     // 左
  ];

  for (let i = 0; i < numPoints; i++) {
    const angle = startAngle + i * angleStep;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
    ctx.strokeStyle = 'rgba(168,85,247,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 标签 - 固定在 canvas 边缘内侧
    const pos = labelPositions[i];
    ctx.font = '11px "Noto Sans SC", sans-serif';
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = pos.align;
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], pos.x, pos.y);
  }

  // 画数据区域
  ctx.beginPath();
  for (let i = 0; i <= numPoints; i++) {
    const idx = i % numPoints;
    const angle = startAngle + idx * angleStep;
    const r = radius * values[idx];
    const x = centerX + Math.cos(angle) * r;
    const y = centerY + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();

  const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
  gradient.addColorStop(0, 'rgba(168,85,247,0.5)');
  gradient.addColorStop(1, 'rgba(236,72,153,0.2)');
  ctx.fillStyle = gradient;
  ctx.fill();

  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 数据点
  for (let i = 0; i < numPoints; i++) {
    const angle = startAngle + i * angleStep;
    const r = radius * values[i];
    const x = centerX + Math.cos(angle) * r;
    const y = centerY + Math.sin(angle) * r;

    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#a855f7';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ===== 次级匹配角色 =====
function showSecondaryMatch(scores, bestId) {
  const section = document.getElementById('secondary-section');
  const container = document.getElementById('secondary-char');
  if (!section || !container) return;

  const sorted = Object.entries(scores)
    .sort(([, a], [, b]) => b - a);

  if (sorted.length < 2) return;

  const secondId = sorted[1][0];
  const secondChar = CHARACTERS[secondId];
  const secondScore = sorted[1][1];
  const bestScore = sorted[0][1];

  // 相似度 = 第二高分 / 第一名分数，映射到 50-70%
  const secondPct = Math.min(70, Math.max(50, Math.round((secondScore / bestScore) * 40 + 30)));

  container.innerHTML = `
    <div class="secondary-avatar-ring">
      <div class="secondary-avatar">
        <img src="${secondChar.avatar}" alt="${secondChar.name}" />
      </div>
    </div>
    <div class="secondary-name">${secondChar.name}</div>
    <div class="secondary-match">相似度 ${secondPct}%</div>
    <div class="secondary-tags">
      ${secondChar.tags.map(t => `<span class="secondary-tag">${t}</span>`).join('')}
    </div>
  `;

  section.style.display = 'block';
  section.style.animation = 'flyFromBottom 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both';
}
